name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+.r'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version and assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: ${VERSION}"

          PDF="docs/files/iRpgFormatter for RDi.pdf"
          if [ ! -f "${PDF}" ]; then
            echo "PDF nicht gefunden: ${PDF}" >&2
            exit 1
          fi

          shopt -s nullglob
          ZIPS=( "docs/files/rdi8.0/iRpgFormatter for RDi"*"(v${VERSION} Update Site).zip" )
          if [ ${#ZIPS[@]} -ne 1 ]; then
            echo "Update-Site-ZIP fuer v${VERSION} nicht eindeutig (${#ZIPS[@]} Treffer):" >&2
            printf '  %s\n' "${ZIPS[@]}" >&2
            exit 1
          fi
          ZIP="${ZIPS[0]}"
          echo "PDF: ${PDF}"
          echo "ZIP: ${ZIP}"

          {
            echo "version=${VERSION}"
            echo "pdf_path=${PDF}"
            echo "zip_path=${ZIP}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: iRpgFormatter v${{ steps.assets.outputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            ${{ steps.assets.outputs.pdf_path }}
            ${{ steps.assets.outputs.zip_path }}
